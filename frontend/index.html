<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CaprinuSIG</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&family=Instrument+Serif:ital@0;1&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.src.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.css" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster@1.4.1/dist/MarkerCluster.Default.css" />
    <link rel="stylesheet" href="style.css">

</head>
<body>

    <button class="botao-toggle-painel" onclick="togglePainel()" title="Mostrar/Ocultar painel">
        ☰
    </button>

    <div id="map"></div>

    <div id="painel-lateral">
        <!-- TOPO -->
        <div class="topo-painel">
            <div class="logo-area">
                <div class="logo-icon">🐐</div>
                <div class="logo-text-group">
                    <p class="logo-title">CaprinuSIG</p>
                    <p class="logo-subtitle">Caprinovinocultura · Semiárido</p>
                </div>
            </div>

            <span class="filtro-label">Métrica Espacial</span>
            <div class="select-wrapper">
                <select id="filtro-dados">
                    <option value="qtd_ovinos">Quantidade de Ovinos</option>
                    <option value="qtd_caprinos">Quantidade de Caprinos</option>
                    <option value="total_produtores">Total de Produtores</option>
                </select>
            </div>
        </div>

        <!-- CORPO COM SCROLL -->
        <div id="scroll-painel">
            <div id="conteudo-dinamico" class="conteudo-painel">
                <div class="placeholder-wrap">
                    <div class="placeholder-icon">🗺️</div>
                    <p class="placeholder-texto">Carregando dados<br>geoespaciais da API…</p>
                </div>
            </div>
        </div>

        <!-- RODAPÉ -->
        <div class="painel-footer">
            <span class="painel-footer-texto">API conectada · Dados em tempo real</span>
            <div class="painel-footer-dot" id="status-dot" title="Status da API"></div>
        </div>
    </div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-search@3.0.9/dist/leaflet-search.src.js"></script>
    <script src="https://unpkg.com/leaflet.markercluster@1.4.1/dist/leaflet.markercluster.js"></script>
    <script src="app.js"></script>
</body>
</html>
